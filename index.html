<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Mythical Creatures Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        #map {
            flex: 1;
            position: relative;
        }

        .sidebar {
            width: 350px;
            background: white;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        .sidebar p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .creatures-list {
            flex: 1;
            overflow-y: auto;
        }

        .creature-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .creature-item:hover {
            background: #f0f0f0;
            border-left-color: #2196F3;
        }

        .creature-item.active {
            background: #e3f2fd;
            border-left-color: #2196F3;
        }

        .creature-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .creature-item-meta {
            font-size: 12px;
            color: #999;
        }

        .stats {
            padding: 15px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .stats div {
            margin: 5px 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
                order: 2;
            }
            .container {
                flex-direction: column;
            }
            #map {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <h1>🐉 Mythical Creatures</h1>
            <p>European folklore & legend explorer</p>
            
            <div class="stats">
                <div>📍 Total creatures: <strong id="total-count">0</strong></div>
                <div>🔍 Showing: <strong id="shown-count">0</strong></div>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search creatures...">
            </div>

            <div class="creatures-list" id="creatures-list">
                <div class="loading">Loading creatures...</div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

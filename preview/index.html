<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>European Mythical Creatures — Map Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }
    #header {
      background: #1a1a2e;
      color: #eee;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header h1 { font-size: 1.1rem; font-weight: 600; }
    #header a { color: #9ab; font-size: 0.8rem; text-decoration: none; }
    #header a:hover { text-decoration: underline; }
    #map { height: calc(100vh - 44px); }
    .leaflet-popup-content b { font-size: 1em; }
    .leaflet-popup-content .lore { font-style: italic; color: #555; margin-top: 4px; }
    .leaflet-popup-content .meta { font-size: 0.85em; color: #777; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🗺️ European Mythical Creatures</h1>
    <a href="https://www.tandfonline.com/doi/full/10.1080/17445647.2013.867544?scroll=top&needAccess=true#d1e129"
       target="_blank" rel="noopener">Data: Sabban (2013), Folklore 124:3</a>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([52, 14], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    fetch('../data/creatures.geojson')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        L.geoJSON(data, {
          pointToLayer: function(feature, latlng) {
            return L.marker(latlng);
          },
          onEachFeature: function(feature, layer) {
            var p = feature.properties;
            layer.bindPopup(
              '<b>' + p.name + '</b>' +
              '<div class="meta">Category: ' + p.category + ' &nbsp;|&nbsp; Alignment: ' + p.alignment + '</div>' +
              '<div class="lore">' + p.lore + '</div>'
            );
          }
        }).addTo(map);
      })
      .catch(function(err) {
        console.error('Failed to load GeoJSON:', err);
      });
  </script>
</body>
</html>
